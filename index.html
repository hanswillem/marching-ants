                        ? "Remove IMG"
                        : "Upload IMG";
                document.getElementById("ref-opacity-label").style.display =
                    hasImage ? "" : "none";
                const slider = document.getElementById("ref-opacity-slider");
                slider.style.display = hasImage ? "" : "none";
                if (hasImage) slider.value = Math.round(state.refOpacity * 100);
                document
                    .getElementById("toolbar")
                    .classList.toggle("has-opacity", hasImage);
            }

            // ── Drag-and-drop image onto canvas area ─────────────────────
            function loadImageFile(file) {
                if (!file || !file.type.startsWith("image/")) return;
                const img = new Image();
                img.onload = () => {
                    // Revoke all existing reference images (deduplicated by URL)
                    const revoked = new Set();
                    state.frames.forEach((f) => {
                        if (
                            f.referenceImage &&
                            !revoked.has(f.referenceImage.src)
                        ) {
                            revoked.add(f.referenceImage.src);
                            URL.revokeObjectURL(f.referenceImage.src);
                        }
                    });
                    // Stamp the new image onto every frame
                    state.frames.forEach((f) => {
                        f.referenceImage = img;
                    });
                    state.refOpacity = 1.0;
                    updateImageToolbar();
                };
                img.src = URL.createObjectURL(file);
            }

            // Sort and assign multiple image files to frames (one per frame),
            // auto-creating frames as needed up to 24.
            function importSequence(files) {
                const sorted = Array.from(files)
                    .filter((f) => f.type.startsWith("image/"))
                    .sort((a, b) =>
                        a.name.localeCompare(b.name, undefined, {
                            numeric: true,
                            sensitivity: "base",
                        }),
                    );
                if (!sorted.length) return;
                const toLoad = sorted.slice(0, 24);

                // Auto-create frames as needed, preserving existing strokes
                while (state.frames.length < toLoad.length) {
                    state.frames.push({ strokes: [], referenceImage: null });
                }

                // Revoke all existing images across all frames (deduped)
                const revoked = new Set();
                state.frames.forEach((f) => {
                    if (
                        f.referenceImage &&
                        !revoked.has(f.referenceImage.src)
                    ) {
                        revoked.add(f.referenceImage.src);
                        URL.revokeObjectURL(f.referenceImage.src);
                    }
                    f.referenceImage = null;
                });

                // Navigate to frame 1 immediately
                state.currentFrameIndex = 0;
                buildStrip();
                updateImageToolbar();

                // Load images async; once all done, fill extra frames with the last image
                let loadedCount = 0;
                toLoad.forEach((file, i) => {
                    const img = new Image();
                    img.onload = () => {
                        state.frames[i].referenceImage = img;
                        loadedCount++;
                        if (i === state.currentFrameIndex) updateImageToolbar();
                        if (loadedCount === toLoad.length) {
                            const lastImg =
                                state.frames[toLoad.length - 1].referenceImage;
                            for (
                                let j = toLoad.length;
                                j < state.frames.length;
                                j++
                            ) {
                                state.frames[j].referenceImage = lastImg;
                            }
                            if (state.currentFrameIndex >= toLoad.length)
                                updateImageToolbar();
                        }
                    };
                    img.src = URL.createObjectURL(file);
                });
            }
            const canvasArea = document.getElementById("canvas-area");
            canvasArea.addEventListener("dragover", (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "copy";
            });
            canvasArea.addEventListener("drop", (e) => {
                e.preventDefault();
                loadImageFile(e.dataTransfer.files[0]);
            });

            // Paste image from clipboard (Cmd/Ctrl+V) → current frame
            document.addEventListener("paste", (e) => {
                const item = Array.from(e.clipboardData.items).find((i) =>
                    i.type.startsWith("image/"),
                );
                if (!item) return;
                e.preventDefault();
                loadImageFile(item.getAsFile());
            });

            // ═══════════════════════════════════════════════════════════════
            //  Frame strip
            // ═══════════════════════════════════════════════════════════════

            function highlightActiveFrame() {
                document.querySelectorAll(".frame-tab").forEach((el) => {
                    el.classList.toggle(
                        "active",
                        parseInt(el.dataset.idx) === state.currentFrameIndex,
                    );
                });
            }

            function buildStrip() {
                const bar = document.getElementById("bottom-bar");
                const addBtn = document.getElementById("add-frame-btn");

                // Remove existing frame tabs
                bar.querySelectorAll(".frame-tab").forEach((el) => el.remove());

                state.frames.forEach((frame, i) => {
                    const tab = document.createElement("button");
                    tab.className =
                        "frame-tab" +
                        (i === state.currentFrameIndex ? " active" : "");
                    tab.dataset.idx = i;
                    tab.title = `Frame ${i + 1}`;

                    const num = document.createElement("span");
                    num.textContent = i + 1;

                    const del = document.createElement("span");
                    del.className = "tab-del";
                    del.textContent = "×";
                    del.title = "Delete frame";
                    del.addEventListener("click", (e) => {
                        e.stopPropagation();
                        if (state.frames.length > 1) deleteFrame(i);
                    });

                    tab.appendChild(num);
                    if (state.frames.length > 1) tab.appendChild(del);
                    tab.addEventListener("click", () => {
                        if (!state.isPlaying) selectFrame(i);
                    });

                    bar.insertBefore(tab, addBtn);
                });

                addBtn.disabled = state.frames.length >= 24;
            }

            function selectFrame(i) {
                state.currentFrameIndex = i;
                highlightActiveFrame();
                updateImageToolbar();
            }

            function addFrame() {
                if (state.frames.length >= 24) return;
                const lastImg =
                    state.frames[state.frames.length - 1].referenceImage;
                state.frames.push({
                    strokes: [],
                    referenceImage: lastImg || null,
                });
                state.currentFrameIndex = state.frames.length - 1;
                buildStrip();
                updateImageToolbar();
            }

            function deleteFrame(i) {
                if (state.frames.length <= 1) return;
                const img = state.frames[i].referenceImage;
                state.frames[i].referenceImage = null;
                state.frames.splice(i, 1);
                if (img && !state.frames.some((f) => f.referenceImage === img))
                    URL.revokeObjectURL(img.src);
                if (state.currentFrameIndex >= state.frames.length) {
                    state.currentFrameIndex = state.frames.length - 1;
                }
                buildStrip();
                updateImageToolbar();
            }

            document
                .getElementById("add-frame-btn")
                .addEventListener("click", addFrame);

            // ═══════════════════════════════════════════════════════════════
            //  Init
            // ═══════════════════════════════════════════════════════════════
            buildStrip();
        </script>
    </body>
</html>
