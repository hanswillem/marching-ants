<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <title>Marching Ants</title>
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <style>
            :root {
                --blue: #0000ff;
                --white: #ffffff;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: #ffffff;
                color: var(--white);
                font-family: "Roboto Mono", monospace;
                font-size: 13px;
                display: flex;
                flex-direction: column;
                align-items: center; /* center #app horizontally */
                min-height: 100vh;
                padding: 12px 24px 24px 24px;
                overflow: auto;
                user-select: none;
            }

            /* ── App wrapper ─────────────────────────────────────────────── */
            #app {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
            }

            /* ── Canvas row: tool panel + canvas column side-by-side ─────── */
            #canvas-row {
                display: flex;
                align-items: flex-start;
                gap: 6px;
            }

            /* ── Canvas column: toolbar / canvas / bottom-bar ────────────── */
            #canvas-column {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
            }

            /* ── Toolbar (top bar) ───────────────────────────────────────── */
            #toolbar {
                background: var(--blue);
                height: 45px;
                display: flex;
                align-items: stretch;
                flex-shrink: 0;
                flex-wrap: nowrap;
                margin-left: -1px; /* align with left edge of canvas outline */
            }

            /* ── Canvas area ─────────────────────────────────────────────── */
            #canvas-area {
                flex: none;
                overflow: visible;
                position: relative;
            }

            #main-canvas {
                display: block;
                cursor: crosshair;
                background: #fff;
                outline: 1px solid var(--blue);
                /* Internal buffer is always 1920×1080 (set by JS).
                   CSS display size is capped at 1920px but scales down
                   on smaller/Retina screens so nothing overflows.
                   getPos() maps CSS coords → canvas coords automatically. */
                width: min(
                    1920px,
                    calc(100vw - 99px),
                    calc((100vh - 146px) * (1920 / 1080))
                );
                aspect-ratio: 1920 / 1080;
            }

            /* ── Bottom bar ──────────────────────────────────────────────── */
            #bottom-bar {
                background: var(--blue);
                height: 45px;
                display: flex;
                align-items: stretch;
                flex-shrink: 0;
                flex-wrap: nowrap;
                margin-left: -1px; /* align with left edge of canvas outline */
            }

            /* ── Buttons ─────────────────────────────────────────────────── */
            button {
                background: var(--blue);
                border: none;
                border-top: 1px solid transparent;
                border-bottom: 1px solid transparent;
                border-left: 1px solid var(--white);
                border-right: 1px solid var(--white);
                color: var(--white);
                padding: 0 12px;
                font-family: "Roboto Mono", monospace;
                font-size: 13px;
                font-weight: 400;
                cursor: pointer;
                letter-spacing: 0.03em;
                white-space: nowrap;
                transition:
                    background-color 0.1s,
                    color 0.1s,
                    border-color 0.1s,
                    outline-color 0.1s;
                border-radius: 0;
                margin: 0 -1px;
                flex-shrink: 0;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                -webkit-appearance: none;
                appearance: none;
                outline: 1px solid transparent;
                outline-offset: -1px;
                box-shadow: none;
                position: relative;
                z-index: 0;
            }
            button:focus,
            button:focus-visible {
                outline: 1px solid transparent;
            }
            button:hover:not(:disabled):not(.force-inactive) {
                background-color: var(--white);
                color: var(--blue);
                outline-color: var(--blue);
                z-index: 1;
            }
            button:active:not(:disabled):not(.force-inactive) {
                outline-color: var(--blue);
                z-index: 1;
            }
            button.force-inactive {
                background-color: var(--blue) !important;
                color: var(--white) !important;
                border-top-color: transparent !important;
                border-bottom-color: transparent !important;
            }
            button:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }
            button.active {
                background-color: var(--white);
                color: var(--blue);
                outline-color: var(--blue);
            }

            /* ── FPS group (number + label as one undivided block) ───────── */
            #fps-group {
                display: flex;
                align-items: center;
                justify-content: center; /* centres the whole "6 FPS" unit */
                gap: 4px; /* space between number and "FPS" text */
                background: var(--blue);
                border-top: 1px solid transparent;
                border-bottom: 1px solid transparent;
                border-left: 1px solid var(--white);
                border-right: 1px solid var(--white);
                margin: 0 -1px;
                padding: 0 12px;
                flex-shrink: 0;
                position: relative;
                cursor: pointer;
                transition:
                    background-color 0.1s,
                    color 0.1s,
                    border-top-color 0.1s,
                    border-bottom-color 0.1s;
            }
            /* Hover: white background, blue top/bottom borders — left/right dividers stay white */
            #fps-group:hover {
                background: var(--white);
                border-top-color: var(--blue);
                border-bottom-color: var(--blue);
            }
            #fps-group:hover #fps-num,
            #fps-group:hover #fps-label {
                color: var(--blue);
            }
            /* Focus-within (after click): return to blue, white text */
            #fps-group:focus-within {
                background: var(--blue);
            }
            #fps-group:focus-within #fps-num,
            #fps-group:focus-within #fps-label {
                color: var(--white);
            }

            #fps-num {
                background: transparent;
                border: none;
                color: var(--white);
                font-family: "Roboto Mono", monospace;
                font-size: 13px;
                font-weight: 400;
                /* shrink the input box to exactly fit its text content,
                   so no invisible padding skews the visual centre */
                field-sizing: content;
                min-width: 8px;
                height: 100%;
                text-align: center;
                padding: 0;
                flex-shrink: 0;
                -moz-appearance: textfield;
                outline: none;
            }
            #fps-num::-webkit-inner-spin-button,
            #fps-num::-webkit-outer-spin-button {
                display: none;
            }
            #fps-num:focus {
                outline: none;
            }

            #fps-label {
                color: var(--white);
                font-family: "Roboto Mono", monospace;
                font-size: 13px;
                font-weight: 400;
                padding: 0; /* gap handled by #fps-group's gap property */
                pointer-events: none;
                flex-shrink: 0;
            }

            /* ── Opacity slider ──────────────────────────────────────────── */
            #ref-opacity-label {
                color: var(--white);
                font-family: "Roboto Mono", monospace;
                font-size: 13px;
                font-weight: 400;
                padding: 0 0 0 14px;
                pointer-events: none;
                flex-shrink: 0;
                align-self: center;
            }
            #ref-opacity-slider {
                -webkit-appearance: none;
                appearance: none;
                height: 2px;
                background: rgba(255, 255, 255, 0.4);
                width: 80px;
                margin: 0 12px 0 8px;
                flex-shrink: 0;
                cursor: pointer;
                outline: none;
                align-self: center;
            }
            #ref-opacity-slider::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                background: var(--white);
                cursor: pointer;
            }

            /* ── Frame tabs ──────────────────────────────────────────────── */
            .frame-tab {
                background: var(--blue);
                border: none;
                border-top: 1px solid transparent;
                border-bottom: 1px solid transparent;
                border-left: 1px solid var(--white);
                border-right: 1px solid var(--white);
                color: var(--white);
                width: 45px;
                height: 100%;
                font-family: "Roboto Mono", monospace;
                font-size: 13px;
                font-weight: 400;
                cursor: pointer;
                position: relative;
                margin: 0 -1px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    background-color 0.1s,
                    color 0.1s,
                    outline-color 0.1s;
                -webkit-appearance: none;
                appearance: none;
                outline: 1px solid transparent;
                outline-offset: -1px;
                box-shadow: none;
                z-index: 0;
            }
            .frame-tab:focus,
            .frame-tab:focus-visible {
                outline: 1px solid transparent;
            }
            .frame-tab.active {
                background-color: var(--white);
                color: var(--blue);
                outline-color: var(--blue);
                z-index: 1;
            }
            /* During playback: snap instantly, no transitions on frame tabs */
            #bottom-bar.is-playing .frame-tab {
                transition: none;
            }
            .frame-tab:hover:not(.active) {
                background-color: var(--white);
                color: var(--blue);
                outline-color: var(--blue);
                z-index: 1;
            }
            .frame-tab:active {
                outline-color: var(--blue);
                z-index: 1;
            }

            .tab-del {
                position: absolute;
                top: 3px;
                right: 4px;
                font-size: 9px;
                line-height: 1;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.1s;
            }
            .frame-tab:hover .tab-del {
                opacity: 1;
                pointer-events: auto;
            }

            /* first element in toolbar — no left border */
            #clear-btn {
                border-left: none;
                margin: 0 -1px 0 0;
            }

            /* last element in toolbar by default — no right border */
            #ref-toggle-btn {
                border-right: none;
                margin: 0 0 0 -1px;
            }
            /* when opacity slider is visible, button is no longer last */
            #toolbar.has-opacity #ref-toggle-btn {
                border-right: 1px solid var(--white);
                margin: 0 -1px;
            }

            /* first element in bottom bar — no left border */
            #onion-btn {
                border-left: none;
                margin: 0 -1px 0 0;
            }

            /* add-frame button: square like frame tabs */
            #add-frame-btn {
                width: 45px;
                padding: 0;
                flex-shrink: 0;
            }

            /* last element in bottom bar — no right border */
            #export-btn {
                border-right: none;
                margin: 0 0 0 -1px;
            }

            /* Play button: fixed width so ▶ and ⏸ don't shift layout */
            #play-btn {
                width: 45px;
                padding: 0;
                flex-shrink: 0;
            }

            /* ── Tool panel (left of canvas) ─────────────────────────────── */
            #tool-panel {
                display: flex;
                flex-direction: column;
                background: var(--blue);
                margin-top: 51px; /* skip toolbar (45px) + gap (6px) to align with canvas top */
                flex-shrink: 0;
            }

            .tool-btn {
                width: 45px;
                height: 45px;
                background: var(--blue);
                border: none;
                border-top: 1px solid var(--white);
                border-bottom: 1px solid var(--white);
                border-left: 1px solid transparent;
                border-right: 1px solid transparent;
                margin: -1px 0;
                padding: 0;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                outline: 1px solid transparent;
                outline-offset: -1px;
                position: relative;
                z-index: 0;
                transition:
                    background-color 0.1s,
                    outline-color 0.1s;
            }
            .tool-btn:first-child {
                border-top-color: transparent;
                margin-top: 0;
            }
            .tool-btn:last-child {
                border-bottom-color: transparent;
                margin-bottom: 0;
            }
            .tool-btn:hover,
            .tool-btn.active {
                background: var(--white);
                outline-color: var(--blue);
                z-index: 1;
            }
            .tool-btn img {
                pointer-events: none;
                filter: brightness(0) invert(1);
            }
            .tool-btn:hover img,
            .tool-btn.active img {
                filter: none;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <div id="canvas-row">
                <!-- ── Tool panel ──────────────────────────────────────────── -->
                <div id="tool-panel">
                    <button class="tool-btn" id="tool-draw" title="Draw (D)">
                        <img src="cursors/new_cursor_draw.svg" alt="Draw" />
                    </button>
                    <button
                        class="tool-btn"
                        id="tool-polyline"
                        title="Polyline (P)"
                    >
                        <img src="cursors/new_cursor_poly.svg" alt="Polyline" />
                    </button>
                    <button
                        class="tool-btn"
                        id="tool-rect"
                        title="Rectangle (R)"
                    >
                        <img
                            src="cursors/new_cursor_square.svg"
                            alt="Rectangle"
                        />
                    </button>
                    <button
                        class="tool-btn"
                        id="tool-circle"
                        title="Circle (C)"
                    >
                        <img src="cursors/new_cursor_circle.svg" alt="Circle" />
                    </button>
                </div>

                <div id="canvas-column">
                    <!-- ── Toolbar ──────────────────────────────────────────────── -->
                    <div id="toolbar">
                        <button id="clear-btn">Clear Frame</button>
                        <button id="ref-toggle-btn">Upload IMG</button>
                        <input
                            type="file"
                            id="ref-file"
                            accept="image/*"
                            multiple
                            style="display: none"
                        />
                        <span id="ref-opacity-label" style="display: none"
                            >Opacity</span
                        >
                        <input
                            type="range"
                            id="ref-opacity-slider"
                            min="0"
                            max="100"
                            value="100"
                            style="display: none"
                        />
                    </div>

                    <!-- ── Canvas ──────────────────────────────────────────────── -->
                    <div id="canvas-area">
                        <canvas
                            id="main-canvas"
                            width="800"
                            height="600"
                        ></canvas>
                    </div>

                    <!-- ── Bottom bar ──────────────────────────────────────────── -->
                    <div id="bottom-bar">
                        <button id="onion-btn">Onion Skinning</button>
                        <div id="fps-group">
                            <input
                                type="number"
                                id="fps-num"
                                min="1"
                                max="24"
                                value="6"
                            />
                            <span id="fps-label">FPS</span>
                        </div>
                        <button id="play-btn" title="Play / Pause  (Space)">
                            ▶
                        </button>
                        <!-- frame tabs injected here by buildStrip() -->
                        <button id="add-frame-btn" title="Add frame  (max 24)">
                            +
                        </button>
                        <button id="export-btn">Export</button>
                    </div>
                </div>
                <!-- #canvas-column -->
            </div>
            <!-- #canvas-row -->
        </div>
        <!-- #app -->

        <script>
            // ═══════════════════════════════════════════════════════════════
            //  State
            // ═══════════════════════════════════════════════════════════════
            const state = {
                frames: [{ strokes: [], referenceImage: null }],
                refOpacity: 1.0, // single global opacity for all reference images
                currentFrameIndex: 0,
                isPlaying: false,
                fps: 6,

                // Marching-ants style
                dashLength: 6, // dash length (px)
                gapLength: 6, // gap length (px)
                antSpeed: 36, // px/sec — 288/8: exactly 8 animation frames per loop
                dashOffset: 0, // global animated offset (diagonal shift)

                // Drawing
                isDrawing: false,
                drawMode: "freehand", // 'freehand' | 'line'
                mouseDownPos: null,
                currentStroke: null, // freehand stroke being built
                previewStroke: null, // preview for line / polyline next segment

                // Polyline mode
                polylineActive: false,
                polylinePoints: [],

                // Shape modes
                ellipseMode: false,
                rectMode: false,

                // Onion skinning
                onionSkin: false,

                // Eraser mode
                eraserMode: false,
                _eraserSnapshot: null,
                _eraserDidErase: false,

                // Space-to-reposition (ellipse / rect only)
                spaceRepositioning: false,
                spaceRepoLastPos: null,
                lastMousePos: null,

                // Pan mode (G key) — translate strokes within the canvas
                panMode: false,
                isPanning: false,
                panLastPos: null, // canvas-space coords of last mousemove
                panOffset: { x: 0, y: 0 }, // live preview offset while dragging

                // Undo — stack of {frameIndex, strokes} snapshots
                undoStack: [],

                // Timing
                lastTs: null,
                frameTimer: 0,
            };

            // ═══════════════════════════════════════════════════════════════
            //  Canvas — resize to fill its container exactly
            // ═══════════════════════════════════════════════════════════════
            const canvas = document.getElementById("main-canvas");
            const ctx = canvas.getContext("2d");

            // Fixed 1920×1080 artboard — never resizes.
            canvas.width = 1920;
            canvas.height = 1080;

            function getPos(e) {
                const r = canvas.getBoundingClientRect();
                return {
                    x: (e.clientX - r.left) * (canvas.width / r.width),
                    y: (e.clientY - r.top) * (canvas.height / r.height),
                };
            }

            // ═══════════════════════════════════════════════════════════════
            //  Rendering
            // ═══════════════════════════════════════════════════════════════

            // Preview stroke: two-pass B/W (black dashes + white dashes filling the gaps).
            // Anti-aliasing is acceptable here — this is just the transient preview line.
            function drawStroke(c, stroke, dashOffset, alpha) {
                if (!stroke || stroke.points.length < 2) return;
                c.save();
                c.globalAlpha = alpha;
                c.lineWidth = 1;
                c.lineCap = "butt";
                c.lineJoin = "round";

                const dL = state.dashLength,
                    gL = state.gapLength;

                // Pass 1 — black dashes
                c.strokeStyle = "#000000";
                c.setLineDash([dL, gL]);
                c.lineDashOffset = dashOffset;
                c.beginPath();
                c.moveTo(stroke.points[0].x, stroke.points[0].y);
                for (let i = 1; i < stroke.points.length; i++)
                    c.lineTo(stroke.points[i].x, stroke.points[i].y);
                c.stroke();

                // Pass 2 — white dashes filling the gaps exactly
                c.strokeStyle = "#ffffff";
                c.setLineDash([gL, dL]);
                c.lineDashOffset = dashOffset + dL;
                c.beginPath();
                c.moveTo(stroke.points[0].x, stroke.points[0].y);
                for (let i = 1; i < stroke.points.length; i++)
                    c.lineTo(stroke.points[i].x, stroke.points[i].y);
                c.stroke();

                c.restore();
            }

            // Onion skin: draw strokes from another frame in a single tint colour
            function drawOnionFrame(c, frameIndex, color, alpha) {
                const strokes = state.frames[frameIndex]?.strokes;
                if (!strokes?.length) return;
                c.save();
                c.globalAlpha = alpha;
                c.lineWidth = 1;
                c.lineCap = "butt";
                c.lineJoin = "round";
                c.setLineDash([state.dashLength, state.gapLength]);
                c.lineDashOffset = state.dashOffset;
                c.strokeStyle = color;
                for (const stroke of strokes) {
                    if (stroke.points.length < 2) continue;
                    c.beginPath();
                    c.moveTo(stroke.points[0].x, stroke.points[0].y);
                    for (let i = 1; i < stroke.points.length; i++) {
                        c.lineTo(stroke.points[i].x, stroke.points[i].y);
                    }
                    c.stroke();
                }
                c.restore();
            }

            // ─── Bresenham pixel-perfect B/W rendering ────────────────────────────────
            //
            // Each stroke is rasterised pixel-by-pixel with Bresenham's line algorithm.
            // Every pixel on the path is assigned a colour — black for the "dash" phase,
            // white for the "gap" phase — so alternating B/W dashes cover the full line,
            // always visible on any background (same as classic Photoshop marching ants).
            // Processing stroke-by-stroke means crossing strokes overdraw each other,
            // which gives a clean layered look.

            let _mask = new Uint8Array(0); // reused each frame; grown if canvas resizes
            const _dirty = []; // indices of set mask cells → fast clear

            function _setMaskColor(px, py, W, H, color) {
                if (px < 0 || px >= W || py < 0 || py >= H) return;
                const i = py * W + px;
                if (!_mask[i]) _dirty.push(i);
                _mask[i] = color; // 1 = black, 2 = white
            }

            function _applyMask(data) {
                for (const i of _dirty) {
                    const p = i * 4;
                    if (_mask[i] === 1) {
                        data[p] = 0;
                        data[p + 1] = 0;
                        data[p + 2] = 0;
                        data[p + 3] = 255;
                    } else {
                        data[p] = 255;
                        data[p + 1] = 255;
                        data[p + 2] = 255;
                        data[p + 3] = 255;
                    }
                    _mask[i] = 0;
                }
                _dirty.length = 0;
            }

            function _bresenham(x0, y0, x1, y1, cb) {
                x0 = Math.round(x0);
                y0 = Math.round(y0);
                x1 = Math.round(x1);
                y1 = Math.round(y1);
                const dx = Math.abs(x1 - x0),
                    dy = Math.abs(y1 - y0);
                const sx = x0 < x1 ? 1 : -1,
                    sy = y0 < y1 ? 1 : -1;
                let err = dx - dy,
                    x = x0,
                    y = y0;
                while (true) {
                    const done = x === x1 && y === y1;
                    cb(x, y, done);
                    if (done) break;
                    const e2 = 2 * err;
                    if (e2 > -dy) {
                        err -= dy;
                        x += sx;
                    }
                    if (e2 < dx) {
                        err += dx;
                        y += sy;
                    }
                }
            }

            // opts: { frameIndex, includeInProgress, dashOffset, scaleX, scaleY, offsetX, offsetY }
            // All opts are optional and fall back to current state values.
            function renderStrokesBresenham(imageData, opts) {
                const {
                    frameIndex = state.currentFrameIndex,
                    includeInProgress = true,
                    dashOffset: dOff = state.dashOffset,
                    scaleX = 1,
                    scaleY = 1,
                    offsetX = 0,
                    offsetY = 0,
                } = opts || {};

                const { data, width: W, height: H } = imageData;
                if (_mask.length < W * H) _mask = new Uint8Array(W * H);

                const dL = state.dashLength;
                const period = dL + state.gapLength;
                const iOff = Math.floor(dOff);

                function processStroke(points) {
                    if (points.length < 2) return;
                    let d = 0;
                    for (let s = 0; s < points.length - 1; s++) {
                        const last = s === points.length - 2;
                        _bresenham(
                            points[s].x * scaleX + offsetX,
                            points[s].y * scaleY + offsetY,
                            points[s + 1].x * scaleX + offsetX,
                            points[s + 1].y * scaleY + offsetY,
                            (x, y, done) => {
                                if (!last && done) return; // skip shared joint pixel
                                const phase =
                                    (((d + iOff) % period) + period) % period;
                                _setMaskColor(x, y, W, H, phase < dL ? 1 : 2); // 1=black, 2=white
                                d++;
                            },
                        );
                    }
                    _applyMask(data); // apply per-stroke so later strokes draw on top
                }

                const frame = state.frames[frameIndex];
                for (const stroke of frame.strokes)
                    processStroke(stroke.points);
                if (
                    includeInProgress &&
                    frameIndex === state.currentFrameIndex
                ) {
                    if (state.currentStroke)
                        processStroke(state.currentStroke.points);
                    if (
                        state.polylineActive &&
                        state.polylinePoints.length >= 2
                    )
                        processStroke(state.polylinePoints);
                }
            }

            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // White background
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Reference image — per-frame image, global opacity
                const currentFrame = state.frames[state.currentFrameIndex];
                if (currentFrame.referenceImage) {
                    const img = currentFrame.referenceImage;
                    const rx = Math.round((canvas.width - img.width) / 2);
                    const ry = Math.round((canvas.height - img.height) / 2);
                    ctx.save();
                    ctx.globalAlpha = state.refOpacity;
                    ctx.drawImage(img, rx, ry);
                    ctx.restore();
                }

                // Onion skin — previous frame only
                if (state.onionSkin && !state.isPlaying) {
                    const i = state.currentFrameIndex;
                    if (i - 1 >= 0) drawOnionFrame(ctx, i - 1, "#e03030", 0.35);
                }

                // Bresenham B/W rendering for committed + in-progress strokes
                const imageData = ctx.getImageData(
                    0,
                    0,
                    canvas.width,
                    canvas.height,
                );
                renderStrokesBresenham(imageData, {
                    offsetX: state.panOffset.x,
                    offsetY: state.panOffset.y,
                });
                ctx.putImageData(imageData, 0, 0);

                // Preview stroke (Canvas path — anti-aliasing is acceptable for preview)
                if (state.previewStroke)
                    drawStroke(ctx, state.previewStroke, state.dashOffset, 0.4);

                // Artboard outline is provided by the 1px CSS padding on #canvas-area (blue background).
            }

            // ═══════════════════════════════════════════════════════════════
            //  Animation loop
            // ═══════════════════════════════════════════════════════════════
            const ANT_FPS = 24; // ant animation steps per second
            let antTimer = 0; // accumulator for ant step timing

            function loop(ts) {
                if (state.lastTs === null) state.lastTs = ts;
                const dt = Math.min((ts - state.lastTs) / 1000, 0.1);
                state.lastTs = ts;

                // Advance ant offset in discrete 1/24 s steps for clean export alignment
                antTimer += dt;
                const antStep = 1 / ANT_FPS;
                while (antTimer >= antStep) {
                    antTimer -= antStep;
                    state.dashOffset += state.antSpeed / ANT_FPS;
                }

                if (state.isPlaying) {
                    // Advance frame timer
                    state.frameTimer += dt;
                    const frameDuration = 1 / state.fps;
                    if (state.frameTimer >= frameDuration) {
                        state.frameTimer -= frameDuration;
                        state.currentFrameIndex =
                            (state.currentFrameIndex + 1) % state.frames.length;
                        highlightActiveFrame();
                    }
                }

                render();
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);

            // ═══════════════════════════════════════════════════════════════
            //  Cursor management
            // ═══════════════════════════════════════════════════════════════
            function updateCursor() {
                if (state.eraserMode) {
                    canvas.style.cursor =
                        'url("cursors/new_cursor_erase.svg") 9 9, crosshair';
                } else {
                    canvas.style.cursor =
                        'url("cursors/new_cursor_regular.svg") 12 12, crosshair';
                }
                updateToolButtons();
            }

            function updateToolButtons() {
                // When eraser is temporarily held, reflect the underlying mode
                const base =
                    state.eraserMode && state._eraserPrevState
                        ? state._eraserPrevState
                        : state;
                const isPolyline = base.polylineActive;
                const isCircle = base.ellipseMode;
                const isRect = base.rectMode;
                const isDraw = !isPolyline && !isCircle && !isRect;
                document
                    .getElementById("tool-draw")
                    .classList.toggle("active", isDraw);
                document
                    .getElementById("tool-polyline")
                    .classList.toggle("active", isPolyline);
                document
                    .getElementById("tool-rect")
                    .classList.toggle("active", isRect);
                document
                    .getElementById("tool-circle")
                    .classList.toggle("active", isCircle);
            }
            updateCursor();

            // ═══════════════════════════════════════════════════════════════
            //  Mouse events
            // ═══════════════════════════════════════════════════════════════

            canvas.addEventListener("mousedown", (e) => {
                if (e.button !== 0) return;
                if (state.isPlaying) return;
                e.preventDefault();

                const pos = getPos(e);

                // ── Polyline mode: add anchor (or snap-to-close) ─────────────
                if (state.polylineActive) {
                    if (nearPolyStart(pos)) {
                        // Close the shape: draw back to first anchor and commit
                        state.polylinePoints.push({
                            ...state.polylinePoints[0],
                        });
                        state.previewStroke = null;
                        commitPolyline(); // commits closed shape, stays in polyline mode
                        return;
                    }
                    state.polylinePoints.push({ ...pos });
                    return;
                }

                // ── Ellipse mode (C) ─────────────────────────────────────────
                if (state.ellipseMode) {
                    state.isDrawing = true;
                    state.drawMode = "ellipse";
                    state.mouseDownPos = { ...pos };
                    return;
                }

                // ── Rect mode (R) ─────────────────────────────────────────────
                if (state.rectMode) {
                    state.isDrawing = true;
                    state.drawMode = "rect";
                    state.mouseDownPos = { ...pos };
                    return;
                }

                // ── SHIFT: straight-line mode ─────────────────────────────────
                if (e.shiftKey) {
                    state.isDrawing = true;
                    state.drawMode = "line";
                    state.mouseDownPos = { ...pos };
                    state.previewStroke = { points: [{ ...pos }, { ...pos }] };
                    return;
                }

                // ── Eraser mode ───────────────────────────────────────────────
                if (state.eraserMode) {
                    // Snapshot current strokes for undo (committed on mouseup if anything was erased)
                    const idx = state.currentFrameIndex;
                    state._eraserSnapshot = state.frames[idx].strokes.map(
                        (s) => ({
                            points: s.points.map((p) => ({ ...p })),
                        }),
                    );
                    state._eraserDidErase = false;
                    return;
                }

                // ── Default: freehand ─────────────────────────────────────────
                state.isDrawing = true;
                state.drawMode = "freehand";
                state.currentStroke = { points: [{ ...pos }] };
            });

            // Returns the snap radius in canvas-space pixels (≈ 25 screen pixels).
            function polySnapRadius() {
                const r = canvas.getBoundingClientRect();
                return 25 * (canvas.width / r.width);
            }

            // True when pos is within snap distance of the first polyline anchor
            // (requires ≥ 3 placed points so we can form a real closed shape).
            function nearPolyStart(pos) {
                if (state.polylinePoints.length < 3) return false;
                const first = state.polylinePoints[0];
                const sr = polySnapRadius();
                const dx = pos.x - first.x;
                const dy = pos.y - first.y;
                return dx * dx + dy * dy <= sr * sr;
            }

            canvas.addEventListener("mousemove", (e) => {
                const pos = getPos(e);
                state.lastMousePos = { ...pos };

                // Pan: accumulate canvas-space delta for live preview
                if (state.isPanning) {
                    if (state.panLastPos) {
                        state.panOffset.x += pos.x - state.panLastPos.x;
                        state.panOffset.y += pos.y - state.panLastPos.y;
                    }
                    state.panLastPos = { ...pos };
                    return;
                }

                if (state.polylineActive) {
                    if (state.polylinePoints.length > 0) {
                        const last =
                            state.polylinePoints[
                                state.polylinePoints.length - 1
                            ];
                        // Snap preview endpoint to first point when cursor is close
                        const snapPos = nearPolyStart(pos)
                            ? { ...state.polylinePoints[0] }
                            : { ...pos };
                        state.previewStroke = {
                            points: [{ ...last }, snapPos],
                        };
                    }
                    return;
                }

                // ── Eraser mode: remove strokes within radius of cursor ────────
                if (state.eraserMode && state._eraserSnapshot !== null) {
                    const RADIUS = 10; // canvas-space pixels
                    const R2 = RADIUS * RADIUS;
                    const idx = state.currentFrameIndex;
                    const before = state.frames[idx].strokes.length;
                    state.frames[idx].strokes = state.frames[
                        idx
                    ].strokes.filter((stroke) => {
                        const pts = stroke.points;
                        for (let i = 0; i < pts.length; i++) {
                            // Check each segment (or single point)
                            const ax = pts[i].x,
                                ay = pts[i].y;
                            if (i === pts.length - 1) {
                                // Last point: just point check
                                const dx = ax - pos.x,
                                    dy = ay - pos.y;
                                if (dx * dx + dy * dy <= R2) return false;
                            } else {
                                // Segment from pts[i] to pts[i+1]
                                const bx = pts[i + 1].x,
                                    by = pts[i + 1].y;
                                const segDx = bx - ax,
                                    segDy = by - ay;
                                const lenSq = segDx * segDx + segDy * segDy;
                                let t =
                                    lenSq > 0
                                        ? ((pos.x - ax) * segDx +
                                              (pos.y - ay) * segDy) /
                                          lenSq
                                        : 0;
                                t = Math.max(0, Math.min(1, t));
                                const cx = ax + t * segDx,
                                    cy = ay + t * segDy;
                                const dx = pos.x - cx,
                                    dy = pos.y - cy;
                                if (dx * dx + dy * dy <= R2) return false;
                            }
                        }
                        return true; // keep stroke
                    });
                    if (state.frames[idx].strokes.length < before) {
                        state._eraserDidErase = true;
                        updateUndoBtn();
                    }
                    return;
                }

                if (!state.isDrawing) return;

                // Space held: shift mouseDownPos by the mouse delta so shape moves
                if (
                    state.spaceRepositioning &&
                    state.spaceRepoLastPos &&
                    state.mouseDownPos
                ) {
                    const dx = pos.x - state.spaceRepoLastPos.x;
                    const dy = pos.y - state.spaceRepoLastPos.y;
                    state.mouseDownPos.x += dx;
                    state.mouseDownPos.y += dy;
                    state.spaceRepoLastPos = { ...pos };
                }

                if (state.drawMode === "freehand") {
                    state.currentStroke.points.push({ ...pos });
                } else if (state.drawMode === "line") {
                    state.previewStroke = {
                        points: [{ ...state.mouseDownPos }, { ...pos }],
                    };
                } else if (state.drawMode === "ellipse") {
                    const pts = ellipsePoints(state.mouseDownPos, pos);
                    state.previewStroke = pts.length ? { points: pts } : null;
                } else if (state.drawMode === "rect") {
                    const pts = rectPoints(state.mouseDownPos, pos, e.shiftKey);
                    state.previewStroke = pts.length ? { points: pts } : null;
                }
            });

            // Helper: commit panOffset to stroke points and push undo entry
            function commitPan() {
                const dx = Math.round(state.panOffset.x);
                const dy = Math.round(state.panOffset.y);
                state.panOffset = { x: 0, y: 0 };
                if (dx !== 0 || dy !== 0) {
                    const idx = state.currentFrameIndex;
                    state.undoStack.push({
                        frameIndex: idx,
                        strokes: state.frames[idx].strokes.map((s) => ({
                            points: s.points.map((p) => ({ ...p })),
                        })),
                    });
                    for (const stroke of state.frames[idx].strokes)
                        for (const pt of stroke.points) {
                            pt.x += dx;
                            pt.y += dy;
                        }
                    updateUndoBtn();
                }
            }

            canvas.addEventListener("mouseup", (e) => {
                if (e.button !== 0) return;

                // ── Eraser mode: commit undo entry if anything was erased ──────
                if (state.eraserMode) {
                    if (state._eraserDidErase) {
                        const idx = state.currentFrameIndex;
                        state.undoStack.push({
                            frameIndex: idx,
                            strokes: state._eraserSnapshot,
                        });
                        updateUndoBtn();
                    }
                    state._eraserSnapshot = null;
                    state._eraserDidErase = false;
                    return;
                }

                if (!state.isDrawing) return;

                if (state.drawMode === "freehand") {
                    if (
                        state.currentStroke &&
                        state.currentStroke.points.length >= 2
                    ) {
                        commitStroke(state.currentStroke);
                    }
                    state.currentStroke = null;
                } else if (state.drawMode === "line") {
                    const p = state.previewStroke;
                    if (
                        p &&
                        (p.points[0].x !== p.points[1].x ||
                            p.points[0].y !== p.points[1].y)
                    ) {
                        commitStroke({
                            points: [{ ...p.points[0] }, { ...p.points[1] }],
                        });
                    }
                    state.previewStroke = null;
                } else if (
                    state.drawMode === "ellipse" ||
                    state.drawMode === "rect"
                ) {
                    const p = state.previewStroke;
                    if (p && p.points.length >= 2) {
                        commitStroke({ points: [...p.points] });
                    }
                    state.previewStroke = null;
                }

                state.isDrawing = false;
                state.drawMode = "freehand";
                state.mouseDownPos = null;
            });

            // dblclick closes the shape (connects back to first point) and commits
            canvas.addEventListener("dblclick", (e) => {
                if (!state.polylineActive) return;
                // Both mousedowns of the dblclick added a point — remove them both
                if (state.polylinePoints.length > 0) state.polylinePoints.pop();
                if (state.polylinePoints.length > 0) state.polylinePoints.pop();
                state.previewStroke = null;
                if (state.polylinePoints.length >= 3) {
                    state.polylinePoints.push({ ...state.polylinePoints[0] });
                }
                commitPolyline(); // commit closed shape, stay in polyline mode
            });

            // Right-click commits the open polyline and stays in polyline mode
            canvas.addEventListener("contextmenu", (e) => {
                e.preventDefault();
                if (!state.polylineActive) return;
                state.previewStroke = null;
                commitPolyline(); // commit as open path, stay in polyline mode
            });

            // Keyboard shortcuts
            document.addEventListener("keydown", (e) => {
                // Don't fire shortcuts when typing in an input
                const inInput =
                    e.target.tagName === "INPUT" && e.target.type !== "range";

                if (e.key === "Escape") {
                    if (state.isPlaying) {
                        togglePlay();
                    }
                    if (state.polylineActive) {
                        state.previewStroke = null; // discard cursor-preview segment before finalising
                        finishPolyline(); // commit only the placed anchors
                    }
                    if (state.isDrawing) {
                        state.isDrawing = false;
                        state.currentStroke = null;
                        state.previewStroke = null;
                        state.drawMode = "freehand";
                    }
                    if (state.ellipseMode || state.rectMode) {
                        state.ellipseMode = false;
                        state.rectMode = false;
                        state.previewStroke = null;
                        updateCursor();
                    }
                    if (state.eraserMode) {
                        state.eraserMode = false;
                        updateCursor();
                    }
                }
                if (e.code === "Space" && !inInput) {
                    e.preventDefault();
                    if (
                        state.isDrawing &&
                        (state.drawMode === "ellipse" ||
                            state.drawMode === "rect")
                    ) {
                        // Start repositioning the shape
                        state.spaceRepositioning = true;
                        state.spaceRepoLastPos = state.lastMousePos
                            ? { ...state.lastMousePos }
                            : null;
                    } else {
                        togglePlay();
                    }
                }
                if ((e.ctrlKey || e.metaKey) && e.key === "z") {
                    e.preventDefault();
                    undo();
                }
                if (!inInput && !e.ctrlKey && !e.metaKey && !e.altKey) {
                    if (e.key === "h" || e.key === "H") {
                        e.preventDefault();
                        if (!state.panMode) {
                            state.panMode = true;
                            state.isPanning = true;
                            state.panLastPos = state.lastMousePos
                                ? { ...state.lastMousePos }
                                : null;
                        }
                    }
                    if (e.key === "d" || e.key === "D") {
                        e.preventDefault();
                        if (state.polylineActive) {
                            state.previewStroke = null;
                            finishPolyline();
                        }
                        state.panMode = false;
                        state.isPanning = false;
                        state.ellipseMode = false;
                        state.rectMode = false;
                        state.eraserMode = false;
                        state.previewStroke = null;
                        updateCursor();
                    }
                    if (e.key === "p" || e.key === "P") {
                        e.preventDefault();
                        if (state.polylineActive) {
                            state.previewStroke = null;
                            finishPolyline(); // also calls cancelPolyline → updateCursor
                        } else {
                            state.ellipseMode = false;
                            state.rectMode = false;
                            state.eraserMode = false;
                            state.previewStroke = null;
                            state.polylineActive = true;
                            state.polylinePoints = [];
                            updateCursor();
                        }
                    }
                    if (e.key === "c" || e.key === "C") {
                        e.preventDefault();
                        if (state.polylineActive) {
                            state.previewStroke = null;
                            finishPolyline();
                        }
                        state.ellipseMode = !state.ellipseMode;
                        state.rectMode = false;
                        state.eraserMode = false;
                        if (!state.ellipseMode) state.previewStroke = null;
                        updateCursor();
                    }
                    if (e.key === "r" || e.key === "R") {
                        e.preventDefault();
                        if (state.polylineActive) {
                            state.previewStroke = null;
                            finishPolyline();
                        }
                        state.rectMode = !state.rectMode;
                        state.ellipseMode = false;
                        state.eraserMode = false;
                        if (!state.rectMode) state.previewStroke = null;
                        updateCursor();
                    }
                    if (e.key === "e" || e.key === "E") {
                        e.preventDefault();
                        if (
                            !state.eraserMode &&
                            !state.isDrawing &&
                            !(
                                state.polylineActive &&
                                state.polylinePoints.length > 0
                            )
                        ) {
                            // Save current mode so we can restore it on key-up
                            state._eraserPrevState = {
                                ellipseMode: state.ellipseMode,
                                rectMode: state.rectMode,
                                polylineActive: state.polylineActive,
                                panMode: state.panMode,
                            };
                            // Temporarily suspend other modes (preserve their state)
                            state.ellipseMode = false;
                            state.rectMode = false;
                            state.polylineActive = false; // polylinePoints are kept in state
                            state.panMode = false;
                            state.isPanning = false;
                            state.previewStroke = null;
                            state.eraserMode = true;
                            updateCursor();
                        }
                        // else: key repeat while held — do nothing
                    }
                    if (e.key === "f" || e.key === "F") {
                        e.preventDefault();
                        addFrame();
                    }
                    if (e.key === "o" || e.key === "O") {
                        e.preventDefault();
                        toggleOnionSkin();
                    }
                    if (e.key === "x" || e.key === "X") {
                        e.preventDefault();
                        clearFrame();
                    }
                    if (e.key === "Backspace") {
                        e.preventDefault();
                        if (!state.isPlaying) {
                            if (state.frames.length > 1) {
                                deleteFrame(state.currentFrameIndex);
                            } else {
                                const frame = state.frames[0];
                                if (frame.referenceImage) {
                                    URL.revokeObjectURL(
                                        frame.referenceImage.src,
                                    );
                                    frame.referenceImage = null;
                                    updateImageToolbar();
                                    clearFrame();
                                } else {
                                    clearFrame();
                                }
                            }
                        }
                    }
                    if (e.key === "ArrowLeft") {
                        e.preventDefault();
                        if (!state.isPlaying && state.currentFrameIndex > 0) {
                            selectFrame(state.currentFrameIndex - 1);
                        }
                    }
                    if (e.key === "ArrowRight") {
                        e.preventDefault();
                        if (
                            !state.isPlaying &&
                            state.currentFrameIndex < state.frames.length - 1
                        ) {
                            selectFrame(state.currentFrameIndex + 1);
                        }
                    }
                }
            });

            document.addEventListener("keyup", (e) => {
                if (e.code === "Space") {
                    state.spaceRepositioning = false;
                    state.spaceRepoLastPos = null;
                }
                if (e.key === "h" || e.key === "H") {
                    if (!state.panMode) return;
                    state.panMode = false;
                    state.isPanning = false;
                    state.panLastPos = null;
                    commitPan();
                }
                if (e.key === "e" || e.key === "E") {
                    if (!state.eraserMode) return;
                    // If mid-erase drag, commit undo before deactivating
                    if (
                        state._eraserDidErase &&
                        state._eraserSnapshot !== null
                    ) {
                        state.undoStack.push({
                            frameIndex: state.currentFrameIndex,
                            strokes: state._eraserSnapshot,
                        });
                        updateUndoBtn();
                    }
                    state._eraserSnapshot = null;
                    state._eraserDidErase = false;
                    state.eraserMode = false;
                    // Restore the mode that was active before E was held
                    if (state._eraserPrevState) {
                        state.ellipseMode = state._eraserPrevState.ellipseMode;
                        state.rectMode = state._eraserPrevState.rectMode;
                        state.polylineActive =
                            state._eraserPrevState.polylineActive;
                        state.panMode = state._eraserPrevState.panMode;
                        if (state.panMode) {
                            state.isPanning = true;
                            state.panLastPos = state.lastMousePos
                                ? { ...state.lastMousePos }
                                : null;
                        }
                        state._eraserPrevState = null;
                    }
                    updateCursor();
                }
            });

            // ═══════════════════════════════════════════════════════════════
            //  Stroke helpers
            // ═══════════════════════════════════════════════════════════════
            // ═══════════════════════════════════════════════════════════════
            //  Shape helpers
            // ═══════════════════════════════════════════════════════════════
            function ellipsePoints(p0, p1) {
                // Always a perfect circle — radius is the smaller of the two axes
                const r =
                    Math.min(Math.abs(p1.x - p0.x), Math.abs(p1.y - p0.y)) / 2;
                const cx = p0.x + Math.sign(p1.x - p0.x) * r;
                const cy = p0.y + Math.sign(p1.y - p0.y) * r;
                const rx = r,
                    ry = r;
                if (rx < 1) return [];
                const N = 64;
                const pts = [];
                for (let i = 0; i <= N; i++) {
                    const a = (i / N) * Math.PI * 2;
                    pts.push({
                        x: cx + Math.cos(a) * rx,
                        y: cy + Math.sin(a) * ry,
                    });
                }
                return pts;
            }

            function rectPoints(p0, p1, constrain) {
                let w = p1.x - p0.x;
                let h = p1.y - p0.y;
                if (constrain) {
                    const side = Math.min(Math.abs(w), Math.abs(h));
                    w = Math.sign(w) * side;
                    h = Math.sign(h) * side;
                }
                if (Math.abs(w) < 1 || Math.abs(h) < 1) return [];
                const x0 = p0.x,
                    y0 = p0.y;
                const x1 = p0.x + w,
                    y1 = p0.y + h;
                return [
                    { x: x0, y: y0 },
                    { x: x1, y: y0 },
                    { x: x1, y: y1 },
                    { x: x0, y: y1 },
                    { x: x0, y: y0 },
                ];
            }

            function commitStroke(stroke) {
                const idx = state.currentFrameIndex;
                // Save snapshot before mutating
                state.undoStack.push({
                    frameIndex: idx,
                    strokes: [...state.frames[idx].strokes],
                });
                state.frames[idx].strokes.push(stroke);
                updateUndoBtn();
            }

            function undo() {
                // Cancel any in-progress drawing first
                if (state.isDrawing || state.polylineActive) {
                    state.isDrawing = false;
                    state.currentStroke = null;
                    state.previewStroke = null;
                    cancelPolyline();
                    return;
                }
                if (!state.undoStack.length) return;
                const snapshot = state.undoStack.pop();
                state.frames[snapshot.frameIndex].strokes = snapshot.strokes;
                updateUndoBtn();
            }

            function clearFrame() {
                const idx = state.currentFrameIndex;
                if (!state.frames[idx].strokes.length) return;
                state.undoStack.push({
                    frameIndex: idx,
                    strokes: [...state.frames[idx].strokes],
                });
                state.frames[idx].strokes = [];
                updateUndoBtn();
            }

            function updateUndoBtn() {} // no-op: undo button removed, shortcut Cmd/Ctrl+Z still works

            document
                .getElementById("clear-btn")
                .addEventListener("click", clearFrame);

            // ── Tool panel buttons ────────────────────────────────────────
            document
                .getElementById("tool-draw")
                .addEventListener("click", () => {
                    if (state.polylineActive) {
                        state.previewStroke = null;
                        finishPolyline();
                    }
                    state.panMode = false;
                    state.isPanning = false;
                    state.ellipseMode = false;
                    state.rectMode = false;
                    state.eraserMode = false;
                    state.previewStroke = null;
                    updateCursor();
                });

            document
                .getElementById("tool-polyline")
                .addEventListener("click", () => {
                    if (state.polylineActive) {
                        state.previewStroke = null;
                        finishPolyline();
                    } else {
                        state.ellipseMode = false;
                        state.rectMode = false;
                        state.eraserMode = false;
                        state.previewStroke = null;
                        state.polylineActive = true;
                        state.polylinePoints = [];
                        updateCursor();
                    }
                });

            document
                .getElementById("tool-rect")
                .addEventListener("click", () => {
                    if (state.polylineActive) {
                        state.previewStroke = null;
                        finishPolyline();
                    }
                    state.rectMode = !state.rectMode;
                    state.ellipseMode = false;
                    state.eraserMode = false;
                    if (!state.rectMode) state.previewStroke = null;
                    updateCursor();
                });

            document
                .getElementById("tool-circle")
                .addEventListener("click", () => {
                    if (state.polylineActive) {
                        state.previewStroke = null;
                        finishPolyline();
                    }
                    state.ellipseMode = !state.ellipseMode;
                    state.rectMode = false;
                    state.eraserMode = false;
                    if (!state.ellipseMode) state.previewStroke = null;
                    updateCursor();
                });
            function toggleOnionSkin() {
                state.onionSkin = !state.onionSkin;
                const btn = document.getElementById("onion-btn");
                btn.classList.toggle("active", state.onionSkin);
                if (!state.onionSkin) {
                    btn.classList.add("force-inactive");
                    btn.addEventListener(
                        "mouseleave",
                        () => btn.classList.remove("force-inactive"),
                        { once: true },
                    );
                } else {
                    // Remove force-inactive in case it was left over from a keyboard toggle
                    btn.classList.remove("force-inactive");
                }
            }

            document
                .getElementById("onion-btn")
                .addEventListener("click", () => toggleOnionSkin());

            function commitPolyline() {
                // Commit the current points but stay in polyline mode
                if (state.polylinePoints.length >= 2) {
                    commitStroke({ points: [...state.polylinePoints] });
                }
                state.polylinePoints = [];
                state.previewStroke = null;
            }

            function finishPolyline() {
                commitPolyline();
                cancelPolyline();
            }

            function cancelPolyline() {
                state.polylineActive = false;
                state.polylinePoints = [];
                state.previewStroke = null;
                const badge = document.getElementById("mode-badge");
                if (badge) badge.classList.remove("on");
                updateCursor();
            }

            // ═══════════════════════════════════════════════════════════════
            //  Playback
            // ═══════════════════════════════════════════════════════════════
            function togglePlay() {
                state.isPlaying = !state.isPlaying;
                state.frameTimer = 0;
                const btn = document.getElementById("play-btn");
                btn.textContent = state.isPlaying ? "⏸" : "▶";
                btn.classList.toggle("playing", state.isPlaying);
                document
                    .getElementById("bottom-bar")
                    .classList.toggle("is-playing", state.isPlaying);
                updateCursor();

                // Cancel any active drawing/polyline/eraser when play starts
                if (state.isPlaying) {
                    if (state.polylineActive) cancelPolyline();
                    state.isDrawing = false;
                    state.currentStroke = null;
                    state.previewStroke = null;
                    state.eraserMode = false;
                }
            }
            document
                .getElementById("play-btn")
                .addEventListener("click", togglePlay);

            // ═══════════════════════════════════════════════════════════════
            //  Toolbar controls
            // ═══════════════════════════════════════════════════════════════

            // FPS (number input only)
            const fpsNum = document.getElementById("fps-num");
            fpsNum.addEventListener("change", () => {
                state.fps = Math.max(
                    1,
                    Math.min(24, parseInt(fpsNum.value) || 12),
                );
                fpsNum.value = state.fps;
            });
            fpsNum.addEventListener("focus", () => fpsNum.select());

            // Clicking anywhere in the FPS group focuses the input (which selects its text)
            document
                .getElementById("fps-group")
                .addEventListener("click", () => {
                    fpsNum.focus();
                });

            // Reference image — single toggle button (per current frame)
            document
                .getElementById("ref-toggle-btn")
                .addEventListener("click", () => {
                    const anyImage = state.frames.some((f) => f.referenceImage);
                    if (anyImage) {
                        const revoked = new Set();
                        state.frames.forEach((f) => {
                            if (
                                f.referenceImage &&
                                !revoked.has(f.referenceImage.src)
                            ) {
                                revoked.add(f.referenceImage.src);
                                URL.revokeObjectURL(f.referenceImage.src);
                            }
                            f.referenceImage = null;
                        });
                        document.getElementById("ref-file").value = "";
                        updateImageToolbar();
                    } else {
                        document.getElementById("ref-file").click();
                    }
                });
            // Single file → current frame only; multiple files → import sequence
            document
                .getElementById("ref-file")
                .addEventListener("change", (e) => {
                    if (e.target.files.length === 1) {
                        loadImageFile(e.target.files[0]);
                    } else if (e.target.files.length > 1) {
                        importSequence(e.target.files);
                    }
                    e.target.value = "";
                });
            document
                .getElementById("ref-opacity-slider")
                .addEventListener("input", (e) => {
                    state.refOpacity = parseInt(e.target.value) / 100;
                });

            // ═══════════════════════════════════════════════════════════════
            //  Export (PNG sequence as ZIP)
            // ═══════════════════════════════════════════════════════════════

            function crc32(buf) {
                let c = 0xffffffff;
                for (let i = 0; i < buf.length; i++) {
                    c ^= buf[i];
                    for (let j = 0; j < 8; j++)
                        c = c & 1 ? (c >>> 1) ^ 0xedb88320 : c >>> 1;
                }
                return (c ^ 0xffffffff) >>> 0;
            }

            function buildZip(files) {
                const enc = new TextEncoder();
                const parts = [],
                    dirs = [];
                let off = 0;
                for (const f of files) {
                    const name = enc.encode(f.name);
                    const crc = crc32(f.data),
                        size = f.data.length;
                    const lh = new DataView(new ArrayBuffer(30 + name.length));
                    lh.setUint32(0, 0x04034b50, true);
                    lh.setUint16(4, 20, true);
                    lh.setUint16(6, 0, true);
                    lh.setUint16(8, 0, true);
                    lh.setUint16(10, 0, true);
                    lh.setUint16(12, 0, true);
                    lh.setUint32(14, crc, true);
                    lh.setUint32(18, size, true);
                    lh.setUint32(22, size, true);
                    lh.setUint16(26, name.length, true);
                    lh.setUint16(28, 0, true);
                    new Uint8Array(lh.buffer).set(name, 30);
                    parts.push(new Uint8Array(lh.buffer), f.data);
                    dirs.push({ name, crc, size, off });
                    off += 30 + name.length + size;
                }
                const cdStart = off;
                for (const d of dirs) {
                    const cd = new DataView(
                        new ArrayBuffer(46 + d.name.length),
                    );
                    cd.setUint32(0, 0x02014b50, true);
                    cd.setUint16(4, 20, true);
                    cd.setUint16(6, 20, true);
                    cd.setUint16(8, 0, true);
                    cd.setUint16(10, 0, true);
                    cd.setUint16(12, 0, true);
                    cd.setUint16(14, 0, true);
                    cd.setUint32(16, d.crc, true);
                    cd.setUint32(20, d.size, true);
                    cd.setUint32(24, d.size, true);
                    cd.setUint16(28, d.name.length, true);
                    cd.setUint16(30, 0, true);
                    cd.setUint16(32, 0, true);
                    cd.setUint16(34, 0, true);
                    cd.setUint16(36, 0, true);
                    cd.setUint32(38, 0, true);
                    cd.setUint32(42, d.off, true);
                    new Uint8Array(cd.buffer).set(d.name, 46);
                    parts.push(new Uint8Array(cd.buffer));
                    off += 46 + d.name.length;
                }
                const eocd = new DataView(new ArrayBuffer(22));
                eocd.setUint32(0, 0x06054b50, true);
                eocd.setUint16(4, 0, true);
                eocd.setUint16(6, 0, true);
                eocd.setUint16(8, dirs.length, true);
                eocd.setUint16(10, dirs.length, true);
                eocd.setUint32(12, off - cdStart, true);
                eocd.setUint32(16, cdStart, true);
                eocd.setUint16(20, 0, true);
                parts.push(new Uint8Array(eocd.buffer));
                const total = parts.reduce((s, p) => s + p.length, 0);
                const zip = new Uint8Array(total);
                let pos = 0;
                for (const p of parts) {
                    zip.set(p, pos);
                    pos += p.length;
                }
                return zip;
            }

            async function exportFrames() {
                const btn = document.getElementById("export-btn");
                btn.disabled = true;
                try {
                    // Always export at the canvas's native resolution (1920×1080).
                    // Reference images are display-only overlays and don't affect output size.
                    const expW = canvas.width;
                    const expH = canvas.height;
                    const sX = 1;
                    const sY = 1;

                    // Export at ANT_FPS (24 fps). For each drawn frame, emit (ANT_FPS / appFPS) sub-frames
                    // so the ant animation marches smoothly in the exported sequence.
                    const appFPS = state.fps;
                    const numDrawn = state.frames.length;
                    // Single frame: always export 8 frames (one full marching-ants loop).
                    // Multi-frame: export enough sub-frames for the full animation at ANT_FPS.
                    const totalFrames =
                        numDrawn === 1
                            ? 8
                            : Math.round((numDrawn * ANT_FPS) / appFPS);

                    const files = [];
                    for (let k = 0; k < totalFrames; k++) {
                        const drawnIdx = Math.min(
                            Math.floor((k * appFPS) / ANT_FPS),
                            numDrawn - 1,
                        );
                        const dashOff = (state.antSpeed * k) / ANT_FPS;

                        const c = document.createElement("canvas");
                        c.width = expW;
                        c.height = expH;
                        const cx = c.getContext("2d");
                        // Transparent background — no fillRect, no reference image

                        const imageData = cx.getImageData(0, 0, expW, expH);
                        renderStrokesBresenham(imageData, {
                            frameIndex: drawnIdx,
                            includeInProgress: false,
                            dashOffset: dashOff,
                            scaleX: sX,
                            scaleY: sY,
                        });
                        cx.putImageData(imageData, 0, 0);

                        const blob = await new Promise((res) =>
                            c.toBlob(res, "image/png"),
                        );
                        const ab = await blob.arrayBuffer();
                        files.push({
                            name: `frame_${String(k + 1).padStart(4, "0")}.png`,
                            data: new Uint8Array(ab),
                        });
                    }

                    const zip = buildZip(files);
                    const a = document.createElement("a");
                    a.href = URL.createObjectURL(
                        new Blob([zip], { type: "application/zip" }),
                    );
                    a.download = "marching-ants-frames.zip";
                    a.click();
                    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
                } finally {
                    btn.disabled = false;
                }
            }

            document
                .getElementById("export-btn")
                .addEventListener("click", exportFrames);

            // Sync the Upload/Remove button, opacity label, and slider to the current frame.
            // Call whenever the active frame changes or its image is added/removed.
            function updateImageToolbar() {
                const frame = state.frames[state.currentFrameIndex];
                const hasImage = !!frame.referenceImage;
                document.getElementById("ref-toggle-btn").textContent =
                    state.frames.some((f) => f.referenceImage)
